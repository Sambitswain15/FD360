name: Playwright CI — run tests + deploy Allure report

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Run Playwright tests and generate Allure report
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Checkout GitHub Pages branch for Allure history
      - name: Checkout GitHub Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Clean previous results
      - name: Clean previous Allure results
        run: rm -rf allure-results allure-report

      - name: Run Playwright tests
        run: npx playwright test --reporter=line,allure-playwright

      # Restore history from previous report
      - name: Restore Allure history
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history/
          fi

      # Add environment info + timestamp
      - name: Add Allure Environment Info
        if: always()
        run: |
          mkdir -p allure-results
          echo "Browser=Chromium" >> allure-results/environment.properties
          echo "Environment=DEV" >> allure-results/environment.properties
          echo "BaseURL=https://dev.fleetdrive360.com" >> allure-results/environment.properties
          echo "Framework=Playwright" >> allure-results/environment.properties
          echo "CI=GitHub Actions" >> allure-results/environment.properties
          echo "Execution_Time=$(date)" >> allure-results/environment.properties

      # Add failure categories
      - name: Add Allure Categories
        if: always()
        run: |
          cat <<EOF > allure-results/categories.json
          [
            {
              "name": "UI Bug",
              "matchedStatuses": ["failed"]
            },
            {
              "name": "Automation Script Issue",
              "matchedStatuses": ["broken"]
            }
          ]
          EOF

      - name: Generate Allure HTML report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # Save history for next run
      - name: Save Allure history
        run: |
          mkdir -p gh-pages
          cp -r allure-report/history gh-pages/ || true

      - name: Upload Allure report as Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v4
        with:
          path: allure-report
          name: github-pages

  deploy:
    name: Deploy Allure report to GitHub Pages
    needs: test
    if: ${{ always() }}
    runs-on: ubuntu-22.04

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4